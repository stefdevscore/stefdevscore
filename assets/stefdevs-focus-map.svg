<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" role="img" aria-labelledby="title desc">
  <title id="title">StefDevs proof signal strip</title>
  <desc id="desc">A compact strip positioning StefDevs as the focus, with Skillmarkdown and Kunsmatig as supporting public proof signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070707" />
      <stop offset="1" stop-color="#15110a" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171614" />
      <stop offset="1" stop-color="#0c0b09" />
    </linearGradient>
  </defs>

  <rect width="1200" height="210" rx="22" fill="url(#bg)" />
  <rect x="1" y="1" width="1198" height="208" rx="21" fill="none" stroke="#ffffff" stroke-opacity="0.1" />

  <text x="54" y="50" fill="#f2bd55" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="760" letter-spacing="1.7">PUBLIC WORK</text>
  <text x="54" y="91" fill="#f7f4ea" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="29" font-weight="800">StefDevs is the focus.</text>
  <text x="54" y="124" fill="#bdb8aa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Skillmarkdown and Kunsmatig are proof signals from the same operating lens.</text>

  <g transform="translate(626 44)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="188" height="86" rx="15" fill="url(#panel)" stroke="#f2bd55" stroke-opacity="0.28" />
    <text x="22" y="35" fill="#f7f4ea" font-size="20" font-weight="770">StefDevs</text>
    <text x="22" y="62" fill="#f2bd55" font-size="13" font-weight="740">Main operating brand</text>

    <rect x="208" y="0" width="172" height="86" rx="15" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="230" y="35" fill="#f7f4ea" font-size="17" font-weight="730">Skillmarkdown</text>
    <text x="230" y="62" fill="#a8a295" font-size="12">Agent workflow asset</text>

    <rect x="400" y="0" width="148" height="86" rx="15" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="422" y="35" fill="#f7f4ea" font-size="17" font-weight="730">Kunsmatig</text>
    <text x="422" y="62" fill="#a8a295" font-size="12">Distribution asset</text>
  </g>

  <path d="M54 160 H1146" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="54" y="184" fill="#8f897c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.35">FOCUS FIRST / SIDE PROJECTS AS EVIDENCE / DETAILS LIVE ON THE SITE</text>
</svg>
