<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" role="img" aria-labelledby="title desc">
  <title id="title">StefDevs proof signal strip</title>
  <desc id="desc">A compact strip positioning StefDevs as the operating brand, with Skillmarkdown and Kunsmatig as supporting public proof signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070707" />
      <stop offset="1" stop-color="#15110a" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171614" />
      <stop offset="1" stop-color="#0c0b09" />
    </linearGradient>
  </defs>

  <rect width="1200" height="210" rx="22" fill="url(#bg)" />
  <rect x="1" y="1" width="1198" height="208" rx="21" fill="none" stroke="#ffffff" stroke-opacity="0.1" />

  <text x="54" y="50" fill="#f2bd55" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="760" letter-spacing="1.7">PUBLIC WORK</text>
  <text x="54" y="82" fill="#f7f4ea" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800">StefDevs is the operating brand.</text>
  <text x="54" y="113" fill="#bdb8aa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Side builds show the same lens without becoming the main offer.</text>

  <g transform="translate(54 136)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="0" y="0" width="308" height="52" rx="14" fill="url(#panel)" stroke="#f2bd55" stroke-opacity="0.28" />
    <text x="20" y="23" fill="#f7f4ea" font-size="17" font-weight="770">StefDevs</text>
    <text x="20" y="40" fill="#f2bd55" font-size="12" font-weight="740">Workflow cleanup</text>

    <rect x="332" y="0" width="308" height="52" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="352" y="23" fill="#f7f4ea" font-size="17" font-weight="730">Skillmarkdown</text>
    <text x="352" y="40" fill="#a8a295" font-size="12">Reusable AI workflows</text>

    <rect x="664" y="0" width="308" height="52" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="684" y="23" fill="#f7f4ea" font-size="17" font-weight="730">Kunsmatig</text>
    <text x="684" y="40" fill="#a8a295" font-size="12">Light tool distribution</text>
  </g>

  <text x="1000" y="166" fill="#8f897c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.1">DETAILS ON SITE</text>
</svg>
