<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">StefDevs focus map</title>
  <desc id="desc">A visual map showing StefDevs as the primary brand, with Skillmarkdown and Kunsmatig as proof signals around it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070707" />
      <stop offset="1" stop-color="#15110a" />
    </linearGradient>
    <linearGradient id="center" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1b1a17" />
      <stop offset="1" stop-color="#0b0b09" />
    </linearGradient>
    <linearGradient id="side" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#131313" />
      <stop offset="1" stop-color="#090909" />
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="0.5" stop-color="#f2bd55" stop-opacity="0.52" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)" />
  <rect x="1" y="1" width="1198" height="358" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.1" />

  <text x="56" y="62" fill="#f2bd55" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="750" letter-spacing="1.8">FOCUS MAP</text>
  <text x="56" y="105" fill="#f7f4ea" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="31" font-weight="780">StefDevs is the operating focus.</text>
  <text x="56" y="136" fill="#bdb8aa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Other public work is useful because it proves the same pattern in smaller, concrete systems.</text>

  <path d="M258 229 H472" stroke="url(#line)" stroke-width="2" />
  <path d="M728 229 H942" stroke="url(#line)" stroke-width="2" />

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(64 174)">
      <rect width="230" height="112" rx="16" fill="url(#side)" stroke="#ffffff" stroke-opacity="0.12" />
      <text x="24" y="38" fill="#f7f4ea" font-size="21" font-weight="760">Skillmarkdown</text>
      <text x="24" y="68" fill="#bdb8aa" font-size="14">Reusable AI-agent workflows</text>
      <text x="24" y="91" fill="#8f8a7d" font-size="13">Packaged, versioned, operable</text>
    </g>

    <g transform="translate(418 153)">
      <rect width="364" height="154" rx="20" fill="url(#center)" stroke="#f2bd55" stroke-opacity="0.36" />
      <g transform="translate(28 31)" color="#f7f4ea">
        <rect x="29" y="0" width="22" height="14" rx="1" fill="currentColor" />
        <rect x="9" y="25" width="25" height="15" rx="1" fill="currentColor" />
        <rect x="32" y="50" width="18" height="14" rx="1" fill="currentColor" />
        <rect x="8" y="72" width="28" height="16" rx="1" fill="currentColor" />
      </g>
      <text x="114" y="58" fill="#f7f4ea" font-size="32" font-weight="820">StefDevs</text>
      <text x="114" y="92" fill="#f2bd55" font-size="17" font-weight="740">Cleaner workflows. Clearer operations.</text>
      <text x="114" y="121" fill="#bdb8aa" font-size="14">Workflow cleanup, systems, sourcing,</text>
      <text x="114" y="143" fill="#bdb8aa" font-size="14">automation, and follow-through.</text>
    </g>

    <g transform="translate(906 174)">
      <rect width="230" height="112" rx="16" fill="url(#side)" stroke="#ffffff" stroke-opacity="0.12" />
      <text x="24" y="38" fill="#f7f4ea" font-size="21" font-weight="760">Kunsmatig</text>
      <text x="24" y="68" fill="#bdb8aa" font-size="14">Sponsored utility distribution</text>
      <text x="24" y="91" fill="#8f8a7d" font-size="13">Sourcing, logistics, follow-through</text>
    </g>
  </g>
</svg>
