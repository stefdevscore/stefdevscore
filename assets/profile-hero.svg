    <path fill="#ffffff" fill-rule="evenodd" d="M 737.00 684.00 L 709.00 712.00 L 678.00 685.00 L 636.00 804.00 L 707.00 870.00 L 780.00 807.00 Z M 783.00 633.00 L 750.00 674.00 L 792.00 761.00 L 878.00 779.00 Z M 633.00 632.00 L 538.00 779.00 L 624.00 761.00 L 666.00 673.00 Z M 636.00 299.00 L 668.00 323.00 L 625.00 356.00 L 649.00 354.00 L 633.00 438.00 L 709.00 535.00 L 768.00 457.00 L 748.00 404.00 L 751.00 379.00 L 783.00 361.00 L 803.00 362.00 L 815.00 372.00 L 818.00 349.00 L 807.00 333.00 L 776.00 326.00 L 749.00 301.00 Z M 728.00 325.00 L 770.00 327.00 L 743.00 335.00 Z M 1266.00 221.00 L 984.00 341.00 L 932.00 437.00 L 801.00 602.00 L 1109.00 447.00 L 1171.00 362.00 L 989.00 412.00 L 1200.00 324.00 Z M 150.00 221.00 L 216.00 324.00 L 430.00 413.00 L 246.00 362.00 L 306.00 446.00 L 614.00 601.00 L 484.00 436.00 L 434.00 342.00 Z M 28.00 28.00 L 128.00 186.00 L 444.00 335.00 L 499.00 433.00 L 707.00 690.00 L 920.00 430.00 L 971.00 336.00 L 1287.00 186.00 L 1387.00 31.00 L 905.00 259.00 L 847.00 391.00 L 707.00 557.00 L 570.00 392.00 L 511.00 258.00 Z" />
  </g>

  <g transform="translate(72 68)" color="#f5f2e8">
    <rect x="47" y="0" width="34" height="21" rx="1" fill="currentColor" />
    <rect x="15" y="38" width="39" height="23" rx="1" fill="currentColor" />
    <rect x="51" y="76" width="27" height="21" rx="1" fill="currentColor" />
    <rect x="13" y="110" width="43" height="25" rx="1" fill="currentColor" />
