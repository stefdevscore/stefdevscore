      <stop offset="0" stop-color="#050505" />
      <stop offset="0.58" stop-color="#101010" />
      <stop offset="1" stop-color="#181818" />
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)" />
  <rect x="1" y="1" width="1198" height="418" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.1" />

  <g transform="translate(70 74)">
    <rect x="0" y="0" width="112" height="164" rx="20" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.14" />
