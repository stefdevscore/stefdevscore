    <rect x="130" y="0" width="124" height="40" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="192" y="26" fill="#f7f4ea" font-size="14" font-weight="690" text-anchor="middle">STRUCTURE</text>
    <rect x="272" y="0" width="112" height="40" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="328" y="26" fill="#f7f4ea" font-size="14" font-weight="690" text-anchor="middle">EXECUTE</text>
    <rect x="402" y="0" width="112" height="40" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.16" />
    <text x="458" y="26" fill="#f7f4ea" font-size="14" font-weight="690" text-anchor="middle">IMPROVE</text>
