<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">StefDevs profile banner</title>
  <desc id="desc">Dark StefDevs banner using the rune mark with the text Operational intelligence for complex work.</desc>
  <defs>
