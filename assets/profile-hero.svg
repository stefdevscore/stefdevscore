<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">StefDevs profile banner</title>
  <desc id="desc">Dark StefDevs banner positioning StefDevs as practical operational intelligence for cleaner workflows and clearer operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050505" />
      <stop offset="0.56" stop-color="#0d0d0b" />
      <stop offset="1" stop-color="#17130b" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151515" />
      <stop offset="1" stop-color="#090907" />
    </linearGradient>
    <linearGradient id="rule" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f6c35b" stop-opacity="0" />
      <stop offset="0.5" stop-color="#f6c35b" stop-opacity="0.92" />
      <stop offset="1" stop-color="#f6c35b" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.24" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="430" rx="30" fill="url(#bg)" />
  <rect x="1" y="1" width="1198" height="428" rx="29" fill="none" stroke="#ffffff" stroke-opacity="0.11" />

