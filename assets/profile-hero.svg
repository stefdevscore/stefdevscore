  <text x="220" y="178" fill="#f7f7f2" fill-opacity="0.9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="650">Operational intelligence</text>
  <text x="220" y="216" fill="#f7f7f2" fill-opacity="0.9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="650">for complex work.</text>
  <text x="220" y="256" fill="#d7d7d0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20">Think. Decide. Organize. Automate. Source. Execute.</text>

