  <text x="180" y="151" fill="#f2bd55" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" font-weight="720" letter-spacing="0">Cleaner workflows. Clearer operations.</text>
  <text x="180" y="195" fill="#d9d6ca" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20">Practical operational intelligence for messy workflows,</text>
  <text x="180" y="225" fill="#d9d6ca" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20">systems, sourcing, automation, and follow-through.</text>

