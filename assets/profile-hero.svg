<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">StefDevs profile banner</title>
  <desc id="desc">A restrained dark StefDevs profile banner for fixing messy workflows before they become expensive problems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
