  <text x="180" y="384" fill="#8d887a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="1.3">BACKEND ENGINEERING / OPERATIONS / SOURCING / AUTOMATION / PRACTICAL EXECUTION</text>
