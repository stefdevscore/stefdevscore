    <path d="M26 58 H304" stroke="url(#edge)" stroke-width="1" />
    <text x="26" y="36" fill="#f2bd55" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="1.8">OPERATING BRIEF</text>
    <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
      <text x="26" y="92" fill="#f7f4ea" font-size="18" font-weight="760">One messy workflow</text>
      <text x="26" y="122" fill="#bbb6a7" font-size="14">Find where work gets stuck.</text>
      <text x="26" y="152" fill="#bbb6a7" font-size="14">Choose the simplest useful fix.</text>
      <text x="26" y="182" fill="#bbb6a7" font-size="14">Leave a handoff people can run.</text>
    </g>
    <g transform="translate(26 205)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
      <rect x="0" y="0" width="86" height="28" rx="14" fill="#f2bd55" fill-opacity="0.14" stroke="#f2bd55" stroke-opacity="0.34" />
      <text x="43" y="19" fill="#f5d28a" font-size="12" font-weight="720" text-anchor="middle">CLEAR</text>
      <rect x="98" y="0" width="86" height="28" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12" />
      <text x="141" y="19" fill="#dad6ca" font-size="12" font-weight="720" text-anchor="middle">LAWFUL</text>
      <rect x="196" y="0" width="86" height="28" rx="14" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12" />
      <text x="239" y="19" fill="#dad6ca" font-size="12" font-weight="720" text-anchor="middle">OPERABLE</text>
