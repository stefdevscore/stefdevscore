<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">StefDevs operating brief</title>
  <desc id="desc">A premium dark operating brief showing how StefDevs turns messy workflows into clear next actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a0a09" />
      <stop offset="1" stop-color="#14110a" />
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#161614" />
      <stop offset="1" stop-color="#0b0b0a" />
    </linearGradient>
    <linearGradient id="rule" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f2bd55" stop-opacity="0" />
      <stop offset="0.5" stop-color="#f2bd55" stop-opacity="0.9" />
      <stop offset="1" stop-color="#f2bd55" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="390" rx="24" fill="url(#bg)" />
  <rect x="1" y="1" width="1198" height="388" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.1" />

