  <text x="56" y="64" fill="#f2bd55" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="750" letter-spacing="1.8">STEFDEVS OPERATING BRIEF</text>
  <text x="56" y="108" fill="#f7f4ea" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="780">From unclear work to practical systems.</text>
  <text x="56" y="142" fill="#bdb8aa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17">The focus is not method theatre. It is making the next action visible, lawful, useful, and operable.</text>
  <path d="M56 170 H1138" stroke="url(#rule)" stroke-width="1.5" />

  <g transform="translate(56 204)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g>
      <rect x="0" y="0" width="250" height="126" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.11" />
      <text x="22" y="36" fill="#f2bd55" font-size="13" font-weight="780">01</text>
      <text x="62" y="36" fill="#f7f4ea" font-size="19" font-weight="760">Clarify the drag</text>
      <text x="22" y="72" fill="#bdb8aa" font-size="14">Map the real workflow, weak</text>
      <text x="22" y="95" fill="#bdb8aa" font-size="14">handoffs, constraints, and risk.</text>
    </g>
    <g transform="translate(278 0)">
      <rect x="0" y="0" width="250" height="126" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.11" />
      <text x="22" y="36" fill="#f2bd55" font-size="13" font-weight="780">02</text>
      <text x="62" y="36" fill="#f7f4ea" font-size="19" font-weight="760">Compare options</text>
      <text x="22" y="72" fill="#bdb8aa" font-size="14">Separate useful paths from</text>
      <text x="22" y="95" fill="#bdb8aa" font-size="14">expensive or fragile ones.</text>
    </g>
    <g transform="translate(556 0)">
      <rect x="0" y="0" width="250" height="126" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.11" />
      <text x="22" y="36" fill="#f2bd55" font-size="13" font-weight="780">03</text>
      <text x="62" y="36" fill="#f7f4ea" font-size="19" font-weight="760">Build the fix</text>
      <text x="22" y="72" fill="#bdb8aa" font-size="14">Process, tracker, automation,</text>
      <text x="22" y="95" fill="#bdb8aa" font-size="14">integration, tool, or clear no.</text>
    </g>
    <g transform="translate(834 0)">
      <rect x="0" y="0" width="250" height="126" rx="16" fill="url(#card)" stroke="#f2bd55" stroke-opacity="0.34" />
      <text x="22" y="36" fill="#f2bd55" font-size="13" font-weight="780">04</text>
      <text x="62" y="36" fill="#f7f4ea" font-size="19" font-weight="760">Leave it operable</text>
      <text x="22" y="72" fill="#bdb8aa" font-size="14">Document decisions, ownership,</text>
      <text x="22" y="95" fill="#bdb8aa" font-size="14">handoff, and next action.</text>
    </g>
  </g>
